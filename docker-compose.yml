version: "3.9"

services:
  nanoclaw:
    image: node:20
    container_name: nanoclaw
    working_dir: /app
    volumes:
      - /root/nanoclaw:/app
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    command: sh -c "npm install && npm start"
    ports:
      - "3000:3000"
    restart: unless-stopped
