name: Build and Publish Docker Images

on:
  push:
    branches: ['main']

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bygger hoved-appen
      - name: Build and push NanoClaw App
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nanoclaw-app:latest

      # Bygger agenten separat
      - name: Build and push NanoClaw Agent
        uses: docker/build-push-action@v6
        with:
          context: ./container
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nanoclaw-agent:latest
