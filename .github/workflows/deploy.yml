name: Build and Publish Docker Images

on:
  push:
    branches: ['main']

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bygg hoved-appen
      - name: Build and push NanoClaw App
        uses: docker/build-push-action@v6 # Oppdatert versjon
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nanoclaw-app:latest

      # Bygg agenten (hvis den ligger i /container mappen)
      - name: Build and push NanoClaw Agent
        uses: docker/build-push-action@v6
        with:
          context: ./container # Peker direkte på mappen med agent-koden
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nanoclaw-agent:latest
